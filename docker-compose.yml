services:
  evaltool:
    build: .
    image: evaltool:latest
    restart: unless-stopped
    hostname: evaltool
    environment:
      - PORT=80
      # URL prefix behind the reverse proxy (https://kiz1.in.ohmportal.de/evaltool).
      - BASE_PATH=${BASE_PATH:-evaltool}
      # LLM proxy — internal LiteLLM gateway by default; override LLM_BASE_URL via
      # .env if needed. The bearer token is NOT set here — it is read at runtime
      # from the Docker secret mounted below, so it is never baked into the image.
      - LLM_BASE_URL=${LLM_BASE_URL:-http://litellm:4000/v1}
      - LLM_API_KEY_FILE=/run/secrets/llmcredentials
      # LLM_MODEL defaults to the proxy's medium model; override via .env if needed.
      # HOST_KEY is optional (anti-abuse for a public instance).
      - LLM_MODEL=${LLM_MODEL:-mistralai/Mistral-Medium-3.5-128B}
      - HOST_KEY=${HOST_KEY:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-800}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-60000}
    volumes:
      # Question sets & prompts: editable on the host without rebuilding the image.
      - ./config:/app/config:ro
    # LLM credentials, provided as a Docker secret — mounted at
    # /run/secrets/llmcredentials (matches LLM_API_KEY_FILE above). The file's
    # first non-comment line is the API token; copy .llmcredentials.example to
    # .llmcredentials and add yours.
    secrets:
      - llmcredentials

    expose: 
      - "80"
    networks:
      - kiz1_internal

networks:
  kiz1_internal:
    external: true

secrets:
  llmcredentials:
    file: ./.llmcredentials
